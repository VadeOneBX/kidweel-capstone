<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kidweel Design System — Proof Card</title>
<style>
  body { margin: 0; background: #07090b; padding: 60px 24px; font-family: 'Space Grotesk', system-ui, sans-serif; color: #f2f4f5; }
  .panel {
    position: relative;
    max-width: 640px;
    margin: 0 auto;
    background: #0f1215;
    border-radius: 2px;
    border: 1px solid #232a2e;
    padding: 1.5rem;
  }
  .bracket {
    position: absolute;
    width: 14px;
    height: 14px;
    border-color: #2f383d;
    border-style: solid;
    border-width: 0;
  }
  .bracket.tl { top: 10px; left: 10px; border-top-width: 1px; border-left-width: 1px; }
  .bracket.tr { top: 10px; right: 10px; border-top-width: 1px; border-right-width: 1px; }
  .bracket.bl { bottom: 10px; left: 10px; border-bottom-width: 1px; border-left-width: 1px; }
  .bracket.br { bottom: 10px; right: 10px; border-bottom-width: 1px; border-right-width: 1px; }
  h2 {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 0.78rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    color: #8b959b;
    margin: 0 0 1rem;
  }
  ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.85rem; }
  li {
    font-size: 1rem;
    font-weight: 500;
    line-height: 1.4;
    padding-left: 1rem;
    border-left: 2px solid #1f4b47;
    color: #8b959b;
  }
  li.active { border-left-color: #3fd9c7; color: #f2f4f5; }
</style>
</head>
<body>
  <!-- Subagency Proof card: bracket-card variant with a fixed 3-bullet claim list. -->
  <section class="panel" aria-label="Subagency proof">
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>
    <h2>Subagency Proof</h2>
    <ul>
      <li class="active">Agents handle scoped work.</li>
      <li>Humans retain decision authority.</li>
      <li>Audit trails record the path.</li>
    </ul>
  </section>
</body>
</html>
