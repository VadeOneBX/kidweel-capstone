<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kidweel Logo — Export Source (Direction B, build-only)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#07090b;font-family:'Space Grotesk',sans-serif;padding:40px;}
  .tile{background:#0b0e10;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .row{display:flex;gap:24px;align-items:flex-end;margin-bottom:24px;}
</style>
</head>
<body>

<!-- dark-background tile, 512x512 -->
<div id="dark-bg" class="tile" style="width:512px;height:512px;">
  <svg width="300" height="300" viewBox="0 0 64 64">
    <path d="M10,26 L10,10 L26,10" fill="none" stroke="#f2f4f5" stroke-width="4" stroke-linecap="square"/>
    <path d="M54,38 L54,54 L38,54" fill="none" stroke="#f2f4f5" stroke-width="4" stroke-linecap="square"/>
    <circle cx="32" cy="32" r="6" fill="#3fd9c7"/>
  </svg>
</div>

<!-- favicon sizes -->
<div id="favicon-64" class="tile" style="width:64px;height:64px;">
  <svg width="52" height="52" viewBox="0 0 64 64">
    <path d="M10,26 L10,10 L26,10" fill="none" stroke="#f2f4f5" stroke-width="5" stroke-linecap="square"/>
    <path d="M54,38 L54,54 L38,54" fill="none" stroke="#f2f4f5" stroke-width="5" stroke-linecap="square"/>
    <circle cx="32" cy="32" r="7" fill="#3fd9c7"/>
  </svg>
</div>
<div id="favicon-32" class="tile" style="width:32px;height:32px;">
  <svg width="27" height="27" viewBox="0 0 64 64">
    <path d="M8,28 L8,8 L28,8" fill="none" stroke="#f2f4f5" stroke-width="7" stroke-linecap="square"/>
    <path d="M56,36 L56,56 L36,56" fill="none" stroke="#f2f4f5" stroke-width="7" stroke-linecap="square"/>
    <circle cx="32" cy="32" r="8" fill="#3fd9c7"/>
  </svg>
</div>
<div id="favicon-16" class="tile" style="width:16px;height:16px;">
  <svg width="14" height="14" viewBox="0 0 64 64">
    <path d="M6,30 L6,6 L30,6" fill="none" stroke="#f2f4f5" stroke-width="9" stroke-linecap="square"/>
    <path d="M58,34 L58,58 L34,58" fill="none" stroke="#f2f4f5" stroke-width="9" stroke-linecap="square"/>
    <circle cx="32" cy="32" r="9" fill="#3fd9c7"/>
  </svg>
</div>

<!-- LinkedIn profile-safe crop, 400x400, mark inset well within the inscribed circle -->
<div id="linkedin-profile" class="tile" style="width:400px;height:400px;">
  <svg width="220" height="220" viewBox="0 0 64 64">
    <path d="M10,26 L10,10 L26,10" fill="none" stroke="#f2f4f5" stroke-width="4" stroke-linecap="square"/>
    <path d="M54,38 L54,54 L38,54" fill="none" stroke="#f2f4f5" stroke-width="4" stroke-linecap="square"/>
    <circle cx="32" cy="32" r="6" fill="#3fd9c7"/>
  </svg>
</div>

<!-- GitHub Pages header-safe lockup, 1280x320 -->
<div id="github-header" class="tile" style="width:1280px;height:320px;">
  <div style="display:flex;align-items:center;gap:36px;">
    <svg width="140" height="140" viewBox="0 0 64 64">
      <path d="M10,26 L10,10 L26,10" fill="none" stroke="#f2f4f5" stroke-width="4" stroke-linecap="square"/>
      <path d="M54,38 L54,54 L38,54" fill="none" stroke="#f2f4f5" stroke-width="4" stroke-linecap="square"/>
      <circle cx="32" cy="32" r="6" fill="#3fd9c7"/>
    </svg>
    <span style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:96px;letter-spacing:2px;color:#f2f4f5;">KIDWEEL</span>
  </div>
</div>

<!-- legibility / optical-balance QA sheet: mark at 16/24/32/64, plus monochrome pass -->
<div id="qa-sheet" style="background:#0b0e10;padding:40px;display:inline-block;">
  <div class="row">
    <div class="tile" style="width:64px;height:64px;"><svg width="52" height="52" viewBox="0 0 64 64"><path d="M10,26 L10,10 L26,10" fill="none" stroke="#f2f4f5" stroke-width="5" stroke-linecap="square"/><path d="M54,38 L54,54 L38,54" fill="none" stroke="#f2f4f5" stroke-width="5" stroke-linecap="square"/><circle cx="32" cy="32" r="7" fill="#3fd9c7"/></svg></div>
    <div class="tile" style="width:32px;height:32px;"><svg width="27" height="27" viewBox="0 0 64 64"><path d="M8,28 L8,8 L28,8" fill="none" stroke="#f2f4f5" stroke-width="7" stroke-linecap="square"/><path d="M56,36 L56,56 L36,56" fill="none" stroke="#f2f4f5" stroke-width="7" stroke-linecap="square"/><circle cx="32" cy="32" r="8" fill="#3fd9c7"/></svg></div>
    <div class="tile" style="width:24px;height:24px;"><svg width="20" height="20" viewBox="0 0 64 64"><path d="M7,29 L7,7 L29,7" fill="none" stroke="#f2f4f5" stroke-width="8" stroke-linecap="square"/><path d="M57,35 L57,57 L35,57" fill="none" stroke="#f2f4f5" stroke-width="8" stroke-linecap="square"/><circle cx="32" cy="32" r="8.5" fill="#3fd9c7"/></svg></div>
    <div class="tile" style="width:16px;height:16px;"><svg width="14" height="14" viewBox="0 0 64 64"><path d="M6,30 L6,6 L30,6" fill="none" stroke="#f2f4f5" stroke-width="9" stroke-linecap="square"/><path d="M58,34 L58,58 L34,58" fill="none" stroke="#f2f4f5" stroke-width="9" stroke-linecap="square"/><circle cx="32" cy="32" r="9" fill="#3fd9c7"/></svg></div>
  </div>
  <div class="row">
    <div class="tile" style="width:64px;height:64px;"><svg width="52" height="52" viewBox="0 0 64 64"><path d="M10,26 L10,10 L26,10" fill="none" stroke="#f2f4f5" stroke-width="5" stroke-linecap="square"/><path d="M54,38 L54,54 L38,54" fill="none" stroke="#f2f4f5" stroke-width="5" stroke-linecap="square"/><circle cx="32" cy="32" r="7" fill="#f2f4f5"/></svg></div>
    <div class="tile" style="width:32px;height:32px;"><svg width="27" height="27" viewBox="0 0 64 64"><path d="M8,28 L8,8 L28,8" fill="none" stroke="#f2f4f5" stroke-width="7" stroke-linecap="square"/><path d="M56,36 L56,56 L36,56" fill="none" stroke="#f2f4f5" stroke-width="7" stroke-linecap="square"/><circle cx="32" cy="32" r="8" fill="#f2f4f5"/></svg></div>
    <div class="tile" style="width:24px;height:24px;"><svg width="20" height="20" viewBox="0 0 64 64"><path d="M7,29 L7,7 L29,7" fill="none" stroke="#f2f4f5" stroke-width="8" stroke-linecap="square"/><path d="M57,35 L57,57 L35,57" fill="none" stroke="#f2f4f5" stroke-width="8" stroke-linecap="square"/><circle cx="32" cy="32" r="8.5" fill="#f2f4f5"/></svg></div>
    <div class="tile" style="width:16px;height:16px;"><svg width="14" height="14" viewBox="0 0 64 64"><path d="M6,30 L6,6 L30,6" fill="none" stroke="#f2f4f5" stroke-width="9" stroke-linecap="square"/><path d="M58,34 L58,58 L34,58" fill="none" stroke="#f2f4f5" stroke-width="9" stroke-linecap="square"/><circle cx="32" cy="32" r="9" fill="#f2f4f5"/></svg></div>
  </div>
</div>

</body>
</html>
