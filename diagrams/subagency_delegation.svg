<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Kidweel subagency delegation</title>
  <desc id="desc">Coordinator delegates bounded skills to reference docs; deterministic gates own transport; forbidden path does not reach broker submit.</desc>
  <defs>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#3d3d3d"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5ec8e8"/>
    </marker>
    <marker id="arrowMuted" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#888"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="720" height="360" rx="12" fill="#353535"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" fill="#f0f0f0" font-size="12">
    <g filter="url(#shadow)">
      <rect x="260" y="24" width="120" height="40" rx="8" fill="url(#panel)" stroke="#6b6b6b"/>
      <text x="320" y="50" text-anchor="middle">CLAUDE.md</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="400" y="24" width="120" height="40" rx="8" fill="url(#panel)" stroke="#6b6b6b"/>
      <text x="460" y="50" text-anchor="middle">AGENTS.md</text>
    </g>
    <line x1="320" y1="64" x2="360" y2="88" stroke="#9a9a9a" marker-end="url(#arrowMuted)"/>
    <line x1="460" y1="64" x2="360" y2="88" stroke="#9a9a9a" marker-end="url(#arrowMuted)"/>
    <g filter="url(#shadow)">
      <rect x="280" y="88" width="160" height="44" rx="8" fill="#2a4a5a" stroke="#5ec8e8"/>
      <text x="360" y="116" text-anchor="middle" font-weight="600">Coordinator</text>
    </g>
    <line x1="320" y1="132" x2="180" y2="168" stroke="#9a9a9a" marker-end="url(#arrowMuted)"/>
    <line x1="400" y1="132" x2="540" y2="168" stroke="#9a9a9a" marker-end="url(#arrowMuted)"/>
    <g filter="url(#shadow)">
      <rect x="48" y="168" width="264" height="40" rx="8" fill="url(#panel)" stroke="#6b6b6b"/>
      <text x="180" y="194" text-anchor="middle" font-size="11">.claude/agents/*.md</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="408" y="168" width="200" height="40" rx="8" fill="url(#panel)" stroke="#6b6b6b"/>
      <text x="508" y="194" text-anchor="middle" font-size="11">Deterministic_gates</text>
    </g>
    <line x1="180" y1="208" x2="180" y2="232" stroke="#9a9a9a" marker-end="url(#arrowMuted)"/>
    <g filter="url(#shadow)">
      <rect x="48" y="232" width="264" height="40" rx="8" fill="url(#panel)" stroke="#6b6b6b"/>
      <text x="180" y="258" text-anchor="middle" font-size="11">.claude/skills/*/SKILL.md</text>
    </g>
    <line x1="180" y1="272" x2="180" y2="296" stroke="#9a9a9a" marker-end="url(#arrowMuted)"/>
    <g filter="url(#shadow)">
      <rect x="48" y="296" width="180" height="40" rx="8" fill="url(#panel)" stroke="#6b6b6b"/>
      <text x="138" y="322" text-anchor="middle" font-size="10">Reference_docs_and_stubs</text>
    </g>
    <line x1="228" y1="252" x2="268" y2="252" stroke="#888" stroke-dasharray="6 4" marker-end="url(#arrowMuted)"/>
    <g filter="url(#shadow)">
      <rect x="268" y="232" width="100" height="40" rx="8" fill="#1a1a1a" stroke="#666"/>
      <text x="318" y="258" text-anchor="middle" font-size="11" fill="#ccc">forbidden</text>
    </g>
    <line x1="508" y1="208" x2="508" y2="296" stroke="#5ec8e8" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="318" y1="272" x2="318" y2="316" stroke="#888" stroke-dasharray="6 4"/>
    <line x1="318" y1="316" x2="448" y2="316" stroke="#888" stroke-dasharray="6 4" marker-end="url(#arrowMuted)"/>
    <g filter="url(#shadow)">
      <rect x="408" y="296" width="200" height="44" rx="8" fill="#2a4a3a" stroke="#6bc48a"/>
      <text x="508" y="324" text-anchor="middle" font-size="11">Transport_repo_gated</text>
    </g>
  </g>
</svg>
